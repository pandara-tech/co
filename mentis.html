<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title data-i18n="page-title">Mentis — Pandara Tech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .mentis-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--paper); padding: 80px 24px; }
  .mentis-card { max-width: 580px; width: 100%; background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 48px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
  .mentis-icon { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 20px; }
  .mentis-card h1 { font-family: 'Azonix', 'Raleway', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; color: var(--ink); }
  .mentis-card .tagline { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .mentis-docs { display: grid; gap: 10px; }
  .mentis-docs a { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border: 1px solid var(--line); border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--ink); transition: all 0.25s var(--ease); }
  .mentis-docs a:hover { border-color: var(--accent); background: var(--accent-soft); }
  .mentis-docs a svg { width: 16px; height: 16px; stroke: var(--muted); transition: stroke 0.25s var(--ease); }
  .mentis-docs a:hover svg { stroke: var(--accent); }
  .mentis-lang { position: fixed; top: 20px; right: 24px; z-index: 200; width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--line-strong); background: var(--surface); cursor: pointer; font-family: 'Raleway', sans-serif; font-size: 12px; font-weight: 800; color: var(--ink-soft); transition: all 0.25s var(--ease); display: flex; align-items: center; justify-content: center; }
  .mentis-lang:hover { border-color: var(--ink); color: var(--ink); }
  html.rtl .mentis-lang { right: auto; left: 24px; font-family: 'BoutrosDinkum', 'Cairo', sans-serif; }
  html.rtl .mentis-card { font-family: 'BoutrosDinkum', 'Cairo', 'Inter', sans-serif; }
  html.rtl .mentis-docs a { font-family: 'BoutrosDinkum', 'Cairo', 'Inter', sans-serif; }
</style>
</head>
<body>

<button class="mentis-lang" id="langToggle">AR</button>

<div class="mentis-page">
  <div class="mentis-card">
    <img src="mentis.png" alt="Mentis" class="mentis-icon">
    <h1 id="mentisTitle">Mentis</h1>
    <p class="tagline" id="mentisTagline" data-i18n="tagline">Smart business and task management application</p>
    <div class="mentis-docs">
      <a href="privacy-policy.html" id="doc1" data-i18n="doc1">Privacy Policy</a>
      <a href="terms-of-use.html" id="doc2" data-i18n="doc2">Terms of Use</a>
      <a href="eula.html" id="doc3" data-i18n="doc3">End User License Agreement</a>
    </div>
  </div>
</div>

<script>
  const t = {
    en: { 'page-title': 'Mentis — Pandara Tech', tagline: 'Smart business and task management application', doc1: 'Privacy Policy', doc2: 'Terms of Use', doc3: 'End User License Agreement', btn: 'AR' },
    ar: { 'page-title': 'Mentis — Pandara Tech', tagline: 'تطبيق إدارة الأعمال والمهام الذكي', doc1: 'سياسة الخصوصية', doc2: 'شروط الاستخدام', doc3: 'اتفاقية ترخيص المستخدم النهائي', btn: 'EN' }
  };
  let lang = localStorage.getItem('pandara-lang') === 'ar' ? 'ar' : 'en';
  function apply(l) {
    lang = l;
    localStorage.setItem('pandara-lang', l);
    const d = t[l];
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.dataset.i18n; if (d[k]) el.textContent = d[k]; });
    document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
    document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.classList.toggle('rtl', l === 'ar');
    document.getElementById('langToggle').textContent = d.btn;
    document.title = d['page-title'];
  }
  document.getElementById('langToggle').addEventListener('click', () => apply(lang === 'en' ? 'ar' : 'en'));
  apply(lang);
</script>

</body>
</html>
