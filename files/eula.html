        'تلتزم الشركة باتخاذ التدابير المعقولة لحماية البيانات التي قد تُعالج من خلال الخدمات الإلكترونية التي تقدمها.',
        'ويتعهد المستخدم بالمحافظة على سرية مفتاح التفعيل وبيانات الدخول وأي معلومات تمكن من الوصول إلى خدمات البرنامج، ويتحمل وحده المسؤولية عن أي استخدام يتم نتيجة إهماله في المحافظة على تلك البيانات.',
        'ويُعد أي إفشاء متعمد لمفاتيح التفعيل أو وسائل تجاوز الحماية أو البيانات السرية المتعلقة بالبرنامج مخالفة جوهرية لهذه الاتفاقية تستوجب إنهاء الترخيص واتخاذ الإجراءات القانونية المناسبة.'
      ]},
      { title: 'المادة الخامسة عشرة: الملكية الفكرية', items: [
        'يقر المستخدم ويوافق على أن جميع حقوق الملكية الفكرية المتعلقة ببرنامج Mentis مملوكة حصريًا للمالك القانوني، وتمارس وتدار وتُسوَّق من خلال الاسم التجاري Pandara Tech.',
        'وتشمل حقوق الملكية الفكرية، على سبيل المثال لا الحصر:',
        'الشفرة المصدرية والشفرة التنفيذية.',
        'الخوارزميات والمنطق البرمجي.',
        'تصميم واجهة المستخدم.',
        'الشعارات والعلامات التجارية.',
        'اسم Mentis.',
        'اسم Pandara Tech.',
        'الأيقونات والرسومات.',
        'القوالب والمكتبات البرمجية المطورة خصيصًا.',
        'قواعد البيانات.',
        'ملفات الترجمة.',
        'الوثائق الفنية.',
        'المواد التعليمية.',
        'التحديثات والإصدارات المستقبلية.',
        'أي ابتكار أو تطوير أو تحسين يطرأ على البرنامج.',
        'ولا يترتب على منح الترخيص للمستخدم أي نقل لحقوق الملكية الفكرية أو أي حق من حقوق المؤلف أو العلامات التجارية أو براءات الاختراع أو الأسرار التجارية.'
      ]},
      { title: 'المادة السادسة عشرة: العلامات التجارية', items: [
        'تعد جميع الأسماء التجارية والعلامات التجارية والشعارات والرموز المستخدمة في البرنامج أو على الموقع الإلكتروني أو في المواد التسويقية ملكًا للشركة أو للمالك القانوني بحسب الأحوال.',
        'ولا يجوز للمستخدم استعمالها أو تسجيلها أو تقليدها أو استخدامها بطريقة قد توحي بوجود علاقة أو شراكة أو وكالة أو ترخيص لم تمنحه الشركة صراحة.'
      ]},
      { title: 'المادة السابعة عشرة: مكونات الجهات الخارجية', items: [
        'قد يحتوي البرنامج على مكتبات أو مكونات أو خدمات أو برامج مملوكة لجهات خارجية ومرخصة للشركة أو متاحة بموجب تراخيص مفتوحة المصدر.',
        'وتظل حقوق تلك المكونات محفوظة لأصحابها وفق شروط تراخيصهم الخاصة، ولا تمنح هذه الاتفاقية المستخدم أي حقوق إضافية تتجاوز ما تسمح به تلك التراخيص.',
        'ولا تتحمل الشركة مسؤولية أي تعديل أو توقف أو إنهاء لتلك الخدمات أو المكونات من قبل مالكيها الأصليين.'
      ]},
      { title: 'المادة الثامنة عشرة: الدعم الفني', items: [
        'يجوز للشركة تقديم خدمات الدعم الفني للمستخدمين وفق السياسة المعتمدة لديها.',
        'ولا يعد تقديم الدعم الفني حقًا مكتسبًا للمستخدم، ويجوز للشركة تعديل نطاقه أو وسائله أو أوقاته أو إنهاؤه وفقًا لما تراه مناسبًا.',
        'ويقتصر الدعم الفني على البرنامج الأصلي المرخص، ولا يشمل أي نسخة معدلة أو غير أصلية أو تم العبث بها.'
      ]},
      { title: 'المادة التاسعة عشرة: إيقاف الدعم والإصدارات القديمة', items: [
        'يجوز للشركة، وفقًا لتقديرها، إيقاف دعم أي إصدار قديم من البرنامج بعد إصدار نسخ أحدث.',
        'ولا يترتب على ذلك أي التزام بتوفير تحديثات أو إصلاحات أو توافق مع أنظمة التشغيل الحديثة للإصدارات التي أوقفت الشركة دعمها.',
        'ويجوز للشركة مطالبة المستخدم بالترقية إلى إصدار أحدث للاستمرار في الحصول على خدمات الدعم أو التحديثات.'
      ]},
      { title: 'المادة العشرون: تعليق أو إنهاء الترخيص', items: [
        'يجوز للشركة تعليق الترخيص أو إنهاؤه فورًا، ودون إشعار مسبق، إذا ثبت قيام المستخدم بأي من الأفعال الآتية:',
        'مخالفة أي حكم جوهري من أحكام هذه الاتفاقية.',
        'استخدام البرنامج بصورة غير مشروعة.',
        'محاولة تجاوز نظام الحماية أو التفعيل.',
        'استعمال مفاتيح تفعيل مزيفة أو معدلة.',
        'مشاركة الترخيص مع الغير دون موافقة الشركة.',
        'نسخ البرنامج أو توزيعه بصورة غير قانونية.',
        'انتهاك حقوق الملكية الفكرية الخاصة بالشركة.',
        'ولا يترتب على إنهاء الترخيص أي حق للمستخدم في استرداد قيمة الترخيص، إلا إذا نص القانون أو سياسة الشركة على خلاف ذلك.'
      ]},
      { title: 'المادة الحادية والعشرون: آثار إنهاء الترخيص', items: [
        'عند انتهاء الترخيص لأي سبب كان، يلتزم المستخدم بما يأتي:',
        'التوقف الفوري عن استخدام البرنامج.',
        'إزالة جميع النسخ المثبتة من البرنامج.',
        'عدم استخدام أي مفتاح تفعيل سبق منحه له.',
        'عدم الاحتفاظ بأي نسخة معدلة من البرنامج.',
        'الامتناع عن أي استخدام لاحق للبرنامج دون الحصول على ترخيص جديد.',
        'ولا يؤثر إنهاء الترخيص على حقوق الشركة في المطالبة بالتعويض أو اتخاذ الإجراءات القانونية عن المخالفات التي وقعت قبل إنهائه.'
      ]},
      { title: 'المادة الثانية والعشرون: إخلاء المسؤولية', items: [
        'يبذل المطور والشركة عناية مهنية معقولة في تطوير البرنامج واختباره وتحسينه، إلا أن البرنامج يُرخص ويُقدم للمستخدم "كما هو" و"حسب توفره".',
        'ولا تضمن الشركة أن يكون البرنامج خاليًا تمامًا من الأخطاء أو الانقطاعات أو أن يلبي جميع توقعات المستخدم أو احتياجاته الخاصة.',
        'كما لا تضمن الشركة توافق البرنامج مع جميع الأجهزة أو أنظمة التشغيل أو البرامج الأخرى، إلا في حدود ما تعلنه رسميًا.'
      ]},
      { title: 'المادة الثالثة والعشرون: حدود المسؤولية', items: [
        'في الحدود التي يسمح بها القانون، لا تتحمل الشركة أو المالك القانوني أو المطور أو موظفو الشركة أو وكلاؤها أي مسؤولية عن:',
        'فقدان البيانات.',
        'فقدان الأرباح.',
        'توقف الأعمال.',
        'خسارة الفرص التجارية.',
        'الأضرار غير المباشرة.',
        'الأضرار العرضية.',
        'الأضرار التبعية.',
        'أي خسائر ناشئة عن استخدام البرنامج أو عدم القدرة على استخدامه.',
        'وتقتصر المسؤولية المالية للشركة، إن وجدت، على المبلغ الذي دفعه المستخدم مقابل الترخيص محل النزاع، وذلك ما لم ينص القانون على خلاف ذلك.'
      ]},
      { title: 'المادة الرابعة والعشرون: مسؤولية المستخدم', items: [
        'يتحمل المستخدم وحده المسؤولية الكاملة عن:',
        'صحة البيانات التي يدخلها.',
        'المستندات التي ينشئها.',
        'الكتب الرسمية الصادرة باستخدام البرنامج.',
        'الامتثال للقوانين واللوائح المنظمة لعمله.',
        'الاحتفاظ بنسخ احتياطية من بياناته.',
        'ولا تتحمل الشركة أي مسؤولية عن النتائج القانونية أو الإدارية أو المالية المترتبة على استخدام المستخدم للبرنامج أو على البيانات التي أدخلها بنفسه.'
      ]},
      { title: 'المادة الخامسة والعشرون: التعويض', items: [
        'يلتزم المستخدم بتعويض الشركة والمالك القانوني عن أي أضرار أو خسائر أو مصروفات أو مطالبات أو رسوم أو أتعاب محاماة تنشأ نتيجة:',
        'مخالفته لهذه الاتفاقية.',
        'إساءة استخدام البرنامج.',
        'انتهاكه لحقوق الغير.',
        'انتهاكه لحقوق الملكية الفكرية.',
        'استخدام البرنامج في أعمال غير مشروعة.',
        'ويجوز للشركة المطالبة بكامل التعويضات التي يجيزها القانون.'
      ]},
      { title: 'المادة السادسة والعشرون: القوة القاهرة', items: [
        'لا تتحمل الشركة أي مسؤولية عن أي تأخير أو إخفاق في تنفيذ أي من التزاماتها إذا كان ذلك ناشئًا، بصورة مباشرة أو غير مباشرة، عن ظروف خارجة عن إرادتها، بما في ذلك على سبيل المثال لا الحصر:',
        'الكوارث الطبيعية.',
        'الحرائق.',
        'الفيضانات.',
        'الزلازل.',
        'الحروب أو النزاعات المسلحة.',
        'الإرهاب.',
        'أعمال الشغب.',
        'الأوبئة أو الجوائح.',
        'انقطاع خدمات الاتصالات أو الإنترنت.',
        'انقطاع التيار الكهربائي.',
        'الأعطال التقنية لدى مزودي الخدمات.',
        'القرارات أو الإجراءات الحكومية.',
        'أي ظرف آخر يستحيل معه تنفيذ الالتزام أو يصبح مرهقًا بصورة غير معتادة.',
        'ويستمر تعليق الالتزامات طوال مدة قيام سبب القوة القاهرة دون أن يترتب على ذلك أي مسؤولية على الشركة.'
      ]},
      { title: 'المادة السابعة والعشرون: التعديلات على الاتفاقية', items: [
        'تحتفظ الشركة بحق تعديل أو تحديث هذه الاتفاقية متى اقتضت الحاجة ذلك، سواء لأسباب قانونية أو تقنية أو تجارية.',
        'وفي حال إجراء تعديلات جوهرية، يجوز للشركة إشعار المستخدم بإحدى الوسائل المناسبة، بما في ذلك داخل البرنامج أو عبر الموقع الإلكتروني أو عند تثبيت التحديثات.',
        'ويُعد استمرار المستخدم في استخدام البرنامج بعد نفاذ التعديلات قبولًا صريحًا بها.',
        'ولا تسري التعديلات بأثر رجعي على الحقوق المكتسبة للمستخدم قبل نفاذها، إلا إذا كان ذلك مطلوبًا بموجب القانون.'
      ]},
      { title: 'المادة الثامنة والعشرون: التنازل عن الحقوق', items: [
        'لا يجوز للمستخدم التنازل عن أي من حقوقه أو التزاماته الناشئة عن هذه الاتفاقية أو نقلها إلى أي شخص طبيعي أو اعتباري دون موافقة كتابية مسبقة من الشركة.',
        'ويجوز للشركة نقل أو إحالة أو التنازل عن حقوقها أو التزاماتها أو ملكية البرنامج أو العلامة التجارية أو أي من أصولها إلى أي شخص طبيعي أو اعتباري أو جهة خلف قانوني، دون الحاجة إلى موافقة المستخدم، شريطة ألا يؤدي ذلك إلى الانتقاص من الحقوق الأساسية الممنوحة له بموجب هذه الاتفاقية.'
      ]},
      { title: 'المادة التاسعة والعشرون: استقلالية الأحكام', items: [
        'إذا قررت أي محكمة أو جهة قضائية مختصة أن أي حكم من أحكام هذه الاتفاقية باطل أو غير قابل للتنفيذ أو مخالف للقانون، فلا يؤثر ذلك على صحة أو نفاذ باقي الأحكام، وتظل نافذة وملزمة إلى أقصى حد يسمح به القانون.',
        'ويُستعاض عن الحكم غير الصحيح بحكم آخر يحقق ذات الغرض القانوني والاقتصادي قدر الإمكان.'
      ]},
      { title: 'المادة الثلاثون: عدم التنازل', items: [
        'إن امتناع الشركة عن ممارسة أي حق من حقوقها أو تأخرها في ممارسته أو عدم اتخاذها أي إجراء بشأن أي مخالفة لهذه الاتفاقية، لا يُعد تنازلًا عن ذلك الحق، ولا يمنعها من ممارسته في أي وقت لاحق.'
      ]},
      { title: 'المادة الحادية والثلاثون: القانون الواجب التطبيق', items: [
        'تخضع هذه الاتفاقية وتُفسر وفقًا لقوانين جمهورية العراق النافذة، بما في ذلك التشريعات المنظمة للعقود الإلكترونية والملكية الفكرية والبرمجيات، وذلك دون الإخلال بأي قواعد آمرة يقررها القانون.'
      ]},
      { title: 'المادة الثانية والثلاثون: الاختصاص القضائي', items: [
        'تختص محاكم جمهورية العراق دون غيرها بالفصل في أي نزاع ينشأ عن هذه الاتفاقية أو يتعلق بها.',
        'ويكون الاختصاص المكاني، ما لم يتفق الطرفان على خلاف ذلك أو يوجب القانون خلافه، للمحكمة المختصة في المحافظة التي يقع فيها المركز الرئيسي لأعمال الشركة.'
      ]},
      { title: 'المادة الثالثة والثلاثون: الإشعارات', items: [
        'يجوز للشركة توجيه الإشعارات أو التنبيهات أو الإعلانات المتعلقة بهذه الاتفاقية أو بالبرنامج أو بالتراخيص أو بالتحديثات إلى المستخدم عبر أي وسيلة مناسبة، بما في ذلك:',
        'داخل البرنامج.',
        'البريد الإلكتروني.',
        'الموقع الإلكتروني الرسمي.',
        'حساب المستخدم.',
        'أي وسيلة إلكترونية تعتمدها الشركة.',
        'وتعد هذه الإشعارات منتجة لآثارها القانونية من تاريخ إرسالها أو نشرها.'
      ]},
      { title: 'المادة الرابعة والثلاثون: الاتفاقية الكاملة', items: [
        'تشكل هذه الاتفاقية كامل التفاهم بين الشركة والمستخدم فيما يتعلق باستخدام برنامج Mentis، وتحل محل أي اتفاق أو تفاهم أو مراسلات أو إقرارات سابقة، سواء كانت شفهية أو مكتوبة، تتعلق بذات الموضوع.'
      ]},
      { title: 'المادة الخامسة والثلاثون: سريان الاتفاقية', items: [
        'تدخل هذه الاتفاقية حيز النفاذ اعتبارًا من تاريخ قبولها إلكترونيًا أو تثبيت البرنامج أو تشغيله لأول مرة أو استخدامه، أيهما أسبق، وتظل سارية طوال مدة استخدام البرنامج أو إلى حين إنهائها وفقًا لأحكام هذه الاتفاقية.'
      ]},
      { title: 'المادة السادسة والثلاثون: بيانات حقوق الملكية', items: [
        'برنامج Mentis هو برنامج حاسوبي مملوك من حيث جميع حقوق الملكية الفكرية وحقوق النشر والتطوير لجلال أمانج عبد العزيز، ويتم تطويره وترخيصه وتسويقه ودعمه الفني من خلال الاسم التجاري Pandara Tech.',
        'وجميع الحقوق غير الممنوحة صراحةً للمستخدم بموجب هذه الاتفاقية تبقى محفوظة بالكامل للشركة والمالك القانوني.'
      ]},
      { title: 'المادة السابعة والثلاثون: قبول الاتفاقية', items: [
        'بمجرد قيام المستخدم بأي من الأعمال الآتية:',
        'تثبيت البرنامج.',
        'تشغيل البرنامج.',
        'إدخال مفتاح التفعيل.',
        'الضغط على زر "أوافق".',
        'أو الاستمرار في استخدام البرنامج بعد عرض هذه الاتفاقية.',
        'فإنه يقر بأنه:',
        'قرأ هذه الاتفاقية بالكامل.',
        'فهم جميع أحكامها وآثارها القانونية.',
        'وافق عليها دون قيد أو شرط.',
        'يتمتع بالأهلية القانونية الكاملة لإبرامها.',
        'يلتزم بجميع أحكامها طوال مدة استخدامه للبرنامج.'
      ]}
    ],

let lang = localStorage.getItem('pandara-lang') === 'ar' ? 'ar' : 'en';

function render(l) {
  const d = fullText[l];
  document.getElementById('labelEl').textContent = d.label;
  document.getElementById('titleEl').textContent = d.title;
  document.getElementById('metaEl').innerHTML = d.meta;

  let html = '<div style="background:var(--accent-soft);border-left:3px solid var(--accent);padding:16px 20px;border-radius:10px;font-size:15px;color:var(--ink-soft);margin-bottom:32px;line-height:1.8;">';
  d.preamble.forEach(p => { html += '<p style="margin-bottom:10px;">' + p + '</p>'; });
  html += '</div>';

  d.chapters.forEach(ch => {
    html += '<div class="clause">';
    html += '<h3>' + ch.title + '</h3>';
    if (ch.items.length === 1) {
      html += '<p>' + ch.items[0] + '</p>';
    } else {
      html += '<p>' + ch.items[0] + '</p><ul>';
      for (let i = 1; i < ch.items.length; i++) {
        html += '<li>' + ch.items[i] + '</li>';
      }
      html += '</ul>';
    }
    html += '</div>';
  });

  document.getElementById('docContainer').innerHTML = html;
  document.getElementById('footerEl').innerHTML = d.footer;
  document.getElementById('langToggle').textContent = d.btn;
  document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.classList.toggle('rtl', l === 'ar');
}

document.getElementById('langToggle').addEventListener('click', () => {
  lang = lang === 'en' ? 'ar' : 'en';
  localStorage.setItem('pandara-lang', lang);
  render(lang);
});

render(lang);
