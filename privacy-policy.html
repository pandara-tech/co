<script>
const fullText = {
  ar: {
    label: 'قانوني', title: 'سياسة الخصوصية', meta: 'Mentis &middot; الإصدار 1.0.6 &middot; آخر تحديث: 10/07/2026',
    preamble: ['ترحب شركة Pandara Tech بكم، وتلتزم بحماية خصوصية مستخدمي برنامج Mentis والحفاظ على سرية بياناتهم الشخصية والمهنية.', 'توضح هذه السياسة كيفية جمع المعلومات واستخدامها ومعالجتها وتخزينها وحمايتها عند استخدام برنامج Mentis أو أي من الخدمات المرتبطة به.', 'إن استخدام البرنامج أو تثبيته أو تفعيله أو الوصول إلى أي من خدماته يعني اطلاع المستخدم على هذه السياسة وموافقته على أحكامها، وذلك بالقدر الذي يسمح به القانون.', 'وفي حال عدم موافقة المستخدم على أي حكم من أحكام هذه السياسة، فيجب عليه الامتناع عن استخدام الخدمات التي تتطلب معالجة البيانات.'],
    chapters: [
      {t:'المادة الأولى: التعاريف',i:['لأغراض هذه السياسة، يكون للمصطلحات الآتية المعاني المبينة إزاء كل منها، ما لم يقتضِ السياق خلاف ذلك:','الشركة: شركة Pandara Tech، المطور والناشر والجهة المسؤولة عن برنامج Mentis.','البرنامج: تطبيق Mentis بجميع مكوناته البرمجية، وإصداراته، وتحديثاته، والخدمات المرتبطة به.','المستخدم: كل شخص طبيعي أو اعتباري يستخدم البرنامج أو إحدى خدماته.','البيانات الشخصية: أي معلومات يمكن أن تؤدي بصورة مباشرة أو غير مباشرة إلى التعرف على هوية المستخدم، مثل الاسم أو البريد الإلكتروني أو رقم الهاتف أو عنوان بروتوكول الإنترنت (IP Address) أو أي معرف إلكتروني آخر.','بيانات الاستخدام: المعلومات المتعلقة بطريقة استخدام البرنامج، مثل إصدار البرنامج، ونظام التشغيل، وسجل الأخطاء الفنية، وبيانات الأداء، وغيرها من المعلومات التقنية.','الخدمات الإلكترونية: أي خدمة يقدمها البرنامج عبر الإنترنت، بما في ذلك التحقق من الترخيص، والبحث عن التحديثات، وتنزيلها، وأي خدمات مستقبلية توفرها الشركة.','البيانات المحلية: البيانات التي يتم تخزينها على جهاز المستخدم فقط دون إرسالها إلى خوادم الشركة.']},
      {t:'المادة الثانية: نطاق سياسة الخصوصية',i:['تطبق هذه السياسة على جميع مستخدمي برنامج Mentis والخدمات الإلكترونية المرتبطة به، وتشمل البيانات التي يتم جمعها أو معالجتها أو تخزينها من خلال البرنامج أو الموقع الإلكتروني الرسمي أو أي خدمة تقدمها الشركة.','ولا تنطبق هذه السياسة على المواقع أو الخدمات أو التطبيقات التي تديرها جهات خارجية، حتى وإن أمكن الوصول إليها من خلال البرنامج أو الموقع الإلكتروني.']},
      {t:'المادة الثالثة: المبادئ العامة',i:['تلتزم الشركة بالمبادئ الآتية عند التعامل مع بيانات المستخدمين:','جمع الحد الأدنى من البيانات اللازمة لتقديم الخدمات.','استخدام البيانات للأغراض المشروعة والمعلنة فقط.','عدم بيع البيانات الشخصية أو تأجيرها أو المتاجرة بها.','اتخاذ التدابير التقنية والتنظيمية المناسبة لحماية البيانات.','احترام خصوصية المستخدم وحقوقه القانونية.','توفير مستوى مناسب من الشفافية بشأن كيفية معالجة البيانات.','وتلتزم الشركة بمعالجة البيانات بما يتوافق مع القوانين والأنظمة النافذة، وبما لا يتعارض مع حقوق المستخدم الأساسية.']},
      {t:'المادة الرابعة: البيانات التي نجمعها',i:['قد تجمع الشركة، بحسب الخدمات التي يستخدمها المستخدم، الفئات الآتية من البيانات:','أولاً: بيانات الترخيص: مفتاح التفعيل، معرف الجهاز (Hardware ID)، حالة الترخيص، نوع الترخيص، تاريخ التفعيل.','ثانياً: البيانات التقنية: إصدار البرنامج، إصدار نظام التشغيل، لغة البرنامج، معلومات الأعطال التقنية عند إرسالها بموافقة المستخدم، بيانات التوافق الفني اللازمة لتقديم الدعم.','ثالثاً: بيانات التواصل: عند تواصل المستخدم مع الشركة، قد نقوم بمعالجة: الاسم، البريد الإلكتروني، رقم الهاتف (إن تم تقديمه)، محتوى الرسائل، المرفقات.','ولا تجمع الشركة أي بيانات إضافية إلا إذا كانت ضرورية لتقديم الخدمة أو بطلب صريح من المستخدم.']},
      {t:'المادة الخامسة: البيانات التي لا نجمعها',i:['تحرص الشركة على احترام خصوصية المستخدم، ولذلك فإن برنامج Mentis لا يقوم، بشكل افتراضي، بجمع أو الوصول إلى:','محتوى الكتب الرسمية التي ينشئها المستخدم.','المستندات أو القوالب المخزنة محلياً.','كلمات المرور الخاصة بالمستخدم.','الملفات الشخصية الموجودة على جهاز المستخدم.','الصور أو مقاطع الفيديو أو التسجيلات الصوتية.','جهات الاتصال.','الموقع الجغرافي.','بيانات لوحة المفاتيح أو ما يكتبه المستخدم.','أي بيانات شخصية غير لازمة لتشغيل البرنامج.','كما لا تقوم الشركة بمراقبة نشاط المستخدم داخل جهازه أو الوصول إلى ملفاته الخاصة دون علمه أو موافقته.']},
      {t:'المادة السادسة: الأساس القانوني لمعالجة البيانات',i:['تعالج الشركة البيانات الشخصية للمستخدم استناداً إلى واحد أو أكثر من الأسس القانونية الآتية، بحسب طبيعة الخدمة المقدمة:','تنفيذ العقد المبرم بين المستخدم والشركة.','تنفيذ الالتزامات القانونية المقررة بموجب القوانين والأنظمة النافذة.','الحصول على موافقة المستخدم، متى كان ذلك مطلوباً.','حماية المصالح المشروعة للشركة، شريطة ألا تتعارض مع الحقوق الأساسية للمستخدم.','ولا تستخدم الشركة البيانات الشخصية لأي غرض يتجاوز ما هو منصوص عليه في هذه السياسة أو ما يجيزه القانون.']},
      {t:'المادة السابعة: كيفية استخدام البيانات',i:['تستخدم الشركة البيانات التي يتم جمعها لتحقيق الأغراض الآتية:','تفعيل البرنامج وإدارة التراخيص.','التحقق من صحة الترخيص ومنع الاستخدام غير المشروع.','تقديم خدمات الدعم الفني.','معالجة طلبات إعادة التفعيل.','تحسين أداء البرنامج وجودته.','إصلاح الأعطال والمشكلات التقنية.','إرسال التحديثات أو الإشعارات المهمة المتعلقة بالبرنامج.','حماية البرنامج من الاحتيال أو إساءة الاستخدام أو الهجمات الإلكترونية.','الامتثال للالتزامات القانونية والتنظيمية.','ولا تستخدم الشركة البيانات في أغراض تسويقية إلا بعد الحصول على موافقة المستخدم إذا كان القانون يتطلب ذلك.']},
      {t:'المادة الثامنة: معالجة البيانات محلياً',i:['صُمم برنامج Mentis ليعمل بصورة أساسية على جهاز المستخدم، وتتم معالجة غالبية البيانات محلياً دون إرسالها إلى خوادم الشركة.','وتشمل البيانات التي تبقى على جهاز المستخدم، على سبيل المثال لا الحصر: الكتب الرسمية، المخاطبات، المستندات، النماذج، القوالب، قواعد البيانات المحلية، السجلات، الملفات التي ينشئها المستخدم.','ولا تنتقل هذه البيانات إلى الشركة تلقائياً، ولا يمكن للشركة الوصول إليها إلا إذا قام المستخدم بنفسه بإرسالها لغرض الدعم الفني أو بناءً على طلبه.']},
      {t:'المادة التاسعة: الاتصال بالإنترنت',i:['يعمل برنامج Mentis دون الحاجة إلى اتصال دائم بالإنترنت.','ومع ذلك، قد يستخدم البرنامج الاتصال بالإنترنت في الحالات الآتية:','التحقق من صحة الترخيص.','البحث عن تحديثات جديدة.','تنزيل التحديثات.','استخدام الخدمات الإلكترونية التي يختارها المستخدم.','إرسال تقارير الأعطال إذا وافق المستخدم على ذلك.','ولا يجري البرنامج أي اتصال بخوادم الشركة في غير الحالات اللازمة لتقديم الخدمات المشار إليها.']},
      {t:'المادة العاشرة: التحديثات',i:['قد تتحقق الشركة بصورة دورية من توفر تحديثات جديدة للبرنامج بهدف:','إصلاح الأخطاء البرمجية.','سد الثغرات الأمنية.','تحسين الأداء.','إضافة مزايا جديدة.','تحسين التوافق مع أنظمة التشغيل.','تحسين استقرار البرنامج.','وقد يتطلب ذلك إرسال معلومات تقنية محدودة، مثل: إصدار البرنامج، إصدار نظام التشغيل، حالة الترخيص، لغة البرنامج.','ولا تتضمن هذه المعلومات محتوى مستندات المستخدم أو بياناته المحلية.']},
      {t:'المادة الحادية عشرة: مشاركة البيانات',i:['لا تقوم الشركة ببيع البيانات الشخصية أو تأجيرها أو المتاجرة بها.','كما لا تفصح عن البيانات لأي طرف ثالث، إلا في الحالات الآتية:','إذا وافق المستخدم صراحةً على ذلك.','إذا كان الإفصاح ضرورياً لتقديم خدمة يطلبها المستخدم.','إذا كان ذلك تنفيذاً لالتزام قانوني أو أمر صادر عن جهة قضائية أو حكومية مختصة.','إذا كان الإفصاح ضرورياً لحماية حقوق الشركة أو مستخدميها أو أمن البرنامج.','وفي جميع الأحوال، تقتصر البيانات التي يتم الإفصاح عنها على الحد الأدنى اللازم لتحقيق الغرض المطلوب.']},
      {t:'المادة الثانية عشرة: مزودو الخدمات',i:['قد تستعين الشركة بجهات خارجية لتقديم بعض الخدمات الفنية المرتبطة بالبرنامج، مثل:','استضافة ملفات التحديث.','خدمات البريد الإلكتروني.','خدمات التحليلات الفنية.','خدمات النسخ الاحتياطي السحابي (إن وجدت).','خدمات الدعم الفني.','وتلتزم الشركة باختيار مزودي خدمات يتمتعون بمستوى مناسب من الأمان والموثوقية، ولا تسمح لهم باستخدام البيانات إلا بالقدر اللازم لتنفيذ الخدمات المتفق عليها.']},
      {t:'المادة الثالثة عشرة: أمن المعلومات',i:['تلتزم الشركة باتخاذ التدابير التقنية والتنظيمية والإدارية المناسبة لحماية البيانات من:','الوصول غير المصرح به.','الاستخدام غير المشروع.','التعديل أو الإتلاف.','الفقدان.','التسريب.','الكشف غير المصرح به.','وتشمل هذه التدابير، بحسب الحاجة: التشفير، التحقق من التراخيص، التحكم في صلاحيات الوصول، تحديثات الأمان، مراقبة الأنظمة، النسخ الاحتياطية اللازمة لخدمات الشركة.','ورغم ذلك، لا يمكن ضمان أمن أي نظام إلكتروني بنسبة (100٪)، ويتحمل المستخدم مسؤولية المحافظة على جهازه ووسائل الحماية الخاصة به.']},
      {t:'المادة الرابعة عشرة: مدة الاحتفاظ بالبيانات',i:['تحتفظ الشركة بالبيانات الشخصية فقط للمدة اللازمة لتحقيق الأغراض التي جُمعت من أجلها، أو للمدة التي تفرضها القوانين والأنظمة النافذة.','وعند انتهاء الحاجة إليها، تتخذ الشركة الإجراءات المناسبة لحذفها أو إخفاء هوية أصحابها أو الاحتفاظ بها إذا كان القانون يوجب ذلك.','ولا تحتفظ الشركة بمحتوى مستندات المستخدم المخزنة محلياً على جهازه.']},
      {t:'المادة الخامسة عشرة: حقوق المستخدم',i:['تؤمن شركة Pandara Tech بأن للمستخدم الحق في معرفة كيفية التعامل مع بياناته، وتسعى إلى تمكينه من ممارسة حقوقه بما يتوافق مع القوانين والأنظمة النافذة.','ويجوز للمستخدم، متى كان ذلك ممكناً قانوناً، أن يطلب:','معرفة البيانات التي تحتفظ بها الشركة عنه.','تصحيح البيانات غير الدقيقة أو غير المكتملة.','تحديث بياناته عند الحاجة.','حذف البيانات التي لم تعد هناك حاجة قانونية للاحتفاظ بها.','تقييد معالجة البيانات في الحالات التي يجيزها القانون.','سحب أي موافقة سبق أن منحها، متى كانت المعالجة قائمة على تلك الموافقة.','تقديم استفسار أو شكوى تتعلق بخصوصيته.','وتقوم الشركة بدراسة الطلبات والرد عليها خلال مدة معقولة، مع مراعاة الالتزامات القانونية والتنظيمية الملقاة على عاتقها.']},
      {t:'المادة السادسة عشرة: مسؤوليات المستخدم',i:['يلتزم المستخدم بما يأتي:','تقديم المعلومات الصحيحة عند طلبها.','المحافظة على سرية مفتاح التفعيل وبيانات حسابه.','حماية جهازه من الوصول غير المصرح به.','تثبيت تحديثات الأمان التي توفرها الشركة متى كانت ضرورية.','عدم مشاركة بيانات الدخول أو وسائل التحقق مع أي شخص آخر.','ويتحمل المستخدم المسؤولية عن أي استخدام يتم نتيجة إهماله في المحافظة على هذه البيانات.']},
      {t:'المادة السابعة عشرة: خصوصية الأطفال',i:['برنامج Mentis غير موجه للأطفال، ولم يُصمم لجمع بياناتهم الشخصية.','ولا تقوم الشركة عن علم بجمع بيانات شخصية تخص الأشخاص الذين لا يملكون الأهلية القانونية لاستخدام البرنامج.','وفي حال تبين للشركة أنها حصلت على بيانات شخصية تخص طفل أو شخص غير مؤهل قانوناً لاستخدام البرنامج، فستقوم باتخاذ الإجراءات المناسبة لحذف تلك البيانات في أقرب وقت ممكن، ما لم يوجب القانون الاحتفاظ بها.']},
      {t:'المادة الثامنة عشرة: الروابط والخدمات الخارجية',i:['قد يحتوي البرنامج أو الموقع الإلكتروني على روابط لمواقع أو خدمات أو منتجات تقدمها جهات خارجية.','ولا تملك الشركة السيطرة على سياسات الخصوصية أو ممارسات تلك الجهات، ولا تتحمل أي مسؤولية عن كيفية جمعها أو استخدامها أو معالجتها للبيانات.','وتنصح الشركة المستخدم بمراجعة سياسات الخصوصية الخاصة بتلك الجهات قبل استخدام خدماتها.']},
      {t:'المادة التاسعة عشرة: نقل البيانات',i:['قد تستعين الشركة بخدمات أو مزودي خدمات أو بنية تحتية تقنية تقع خارج الدولة التي يقيم فيها المستخدم، وذلك عند الحاجة لتقديم بعض الخدمات الإلكترونية.','وفي هذه الحالات، تتخذ الشركة التدابير المعقولة لضمان توفير مستوى مناسب من الحماية للبيانات، بما يتوافق مع القوانين والأنظمة المعمول بها.','ولا يتم نقل البيانات إلا بالقدر اللازم لتقديم الخدمة أو تنفيذ الالتزامات القانونية أو التعاقدية.']},
      {t:'المادة العشرون: التغييرات على سياسة الخصوصية',i:['يجوز للشركة تعديل أو تحديث هذه السياسة في أي وقت إذا اقتضت الحاجة القانونية أو التقنية أو التشغيلية ذلك.','وفي حال إجراء تعديلات جوهرية، تقوم الشركة بإشعار المستخدم بإحدى الوسائل المناسبة، بما في ذلك: داخل البرنامج، الموقع الإلكتروني، البريد الإلكتروني (إن وجد)، صفحة التحديثات، أي وسيلة إلكترونية أخرى تعتمدها الشركة.','ويعد استمرار المستخدم في استخدام البرنامج بعد نفاذ التعديلات موافقةً على السياسة بصيغتها المحدثة.']},
      {t:'المادة الحادية والعشرون: التواصل معنا',i:['للاستفسارات أو الطلبات أو الشكاوى المتعلقة بسياسة الخصوصية أو بمعالجة البيانات الشخصية، يمكن التواصل مع الشركة من خلال وسائل الاتصال الرسمية التي توفرها Pandara Tech عبر موقعها الإلكتروني أو قنواتها الرسمية.','وتبذل الشركة جهداً معقولاً للرد على جميع الطلبات خلال مدة مناسبة، مع مراعاة طبيعة الطلب والمتطلبات القانونية.']},
      {t:'المادة الثانية والعشرون: القانون الواجب التطبيق',i:['تخضع هذه السياسة وتفسر وفقاً لقوانين جمهورية العراق، وذلك دون الإخلال بأي قواعد آمرة تتعلق بحماية البيانات أو المعاملات الإلكترونية أو حقوق المستهلك تكون واجبة التطبيق.','وفي حال نشوء أي نزاع يتعلق بهذه السياسة، يسعى الطرفان أولاً إلى تسويته وديًا، وفي حال تعذر ذلك، تختص المحاكم العراقية بالنظر فيه وفقاً للقانون.']},
      {t:'المادة الثالثة والعشرون: أولوية النسخة العربية',i:['إذا تمت ترجمة هذه السياسة إلى أي لغة أخرى، فإن النسخة العربية هي النسخة الرسمية والمعتمدة، ويُعتد بها عند وجود أي اختلاف أو تعارض في التفسير بين النسخ.']},
      {t:'المادة الرابعة والعشرون: سريان سياسة الخصوصية',i:['تدخل هذه السياسة حيز النفاذ اعتباراً من تاريخ نشرها أو إتاحتها للمستخدم داخل البرنامج أو على الموقع الإلكتروني.','ويُعد استمرار المستخدم في استخدام برنامج Mentis أو أي من خدماته بعد هذا التاريخ موافقةً على أحكام هذه السياسة.']},
      {t:'المادة الخامسة والعشرون: أحكام عامة',i:['تشكل هذه السياسة جزءاً لا يتجزأ من الوثائق القانونية المنظمة لاستخدام برنامج Mentis، وتُقرأ وتُفسر بالاقتران مع: اتفاقية ترخيص المستخدم النهائي (EULA)، شروط الاستخدام (Terms of Use).','وفي حال وجود تعارض بين هذه السياسة وأي وثيقة أخرى فيما يتعلق بمعالجة البيانات الشخصية، تُطبق أحكام سياسة الخصوصية بالقدر المتعلق بحماية البيانات.']}

    chapters: [
      {t:'Article 1: Definitions',i:['For the purposes of this policy, the following terms shall have the meanings ascribed below, unless the context otherwise requires:','Company: Pandara Tech, the developer, publisher, and entity responsible for Mentis.','Software: The Mentis application with all its software components, versions, updates, and related services.','User: Any natural or legal person who uses the Software or any of its services.','Personal Data: Any information that may directly or indirectly identify the User, such as name, email, phone number, IP address, or any other electronic identifier.','Usage Data: Information relating to how the Software is used, such as software version, operating system, error logs, performance data, and other technical information.','Electronic Services: Any service provided by the Software online, including license verification, update searches, downloads, and any future services provided by the Company.','Local Data: Data stored only on the User\'s device without being sent to the Company\'s servers.']},
      {t:'Article 2: Scope of Privacy Policy',i:['This policy applies to all users of Mentis and related electronic services, and covers data collected, processed, or stored through the Software, the official website, or any service provided by the Company.','This policy does not apply to websites, services, or applications operated by third parties, even if accessible through the Software or website.']},
      {t:'Article 3: General Principles',i:['The Company adheres to the following principles when handling User data:','Collecting the minimum data necessary to provide services.','Using data only for legitimate and announced purposes.','Not selling, renting, or trading personal data.','Taking appropriate technical and organizational measures to protect data.','Respecting User privacy and legal rights.','Providing an appropriate level of transparency about how data is processed.','The Company commits to processing data in accordance with applicable laws and without conflicting with the User\'s fundamental rights.']},

      {t:'Article 5: Data We Do Not Collect',i:['The Company is committed to respecting User privacy. Therefore, Mentis does not, by default, collect or access:','Content of official documents created by the User.','Locally stored documents or templates.','User passwords.','Personal files on the User\'s device.','Photos, videos, or audio recordings.','Contacts.','Geographic location.','Keyboard data or what the User types.','Any personal data unnecessary for operating the Software.','The Company also does not monitor the User\'s activity on their device or access their private files without their knowledge or consent.']},
      {t:'Article 6: Legal Basis for Data Processing',i:['The Company processes the User\'s personal data based on one or more of the following legal grounds, depending on the nature of the service provided:','Performance of the contract between the User and the Company.','Compliance with legal obligations under applicable laws and regulations.','Obtaining the User\'s consent, where required.','Protecting the Company\'s legitimate interests, provided they do not conflict with the User\'s fundamental rights.','The Company does not use personal data for any purpose beyond what is stated in this policy or permitted by law.']},
      {t:'Article 7: How We Use Data',i:['The Company uses collected data for the following purposes:','Activating the Software and managing licenses.','Verifying license validity and preventing unauthorized use.','Providing technical support services.','Processing reactivation requests.','Improving Software performance and quality.','Fixing bugs and technical issues.','Sending important updates or notices related to the Software.','Protecting the Software from fraud, misuse, or cyber attacks.','Complying with legal and regulatory obligations.','The Company does not use data for marketing purposes without obtaining the User\'s consent if required by law.']},
      {t:'Article 8: Local Data Processing',i:['Mentis is designed to operate primarily on the User\'s device, and most data is processed locally without being sent to the Company\'s servers.','Data that remains on the User\'s device includes, but is not limited to: official documents, correspondence, documents, forms, templates, local databases, records, files created by the User.','This data is not automatically transferred to the Company, and the Company cannot access it unless the User themselves sends it for technical support or at their request.']},
      {t:'Article 9: Internet Connection',i:['Mentis does not require a permanent internet connection.','However, the Software may use an internet connection in the following cases:','License validity verification.','Searching for new updates.','Downloading updates.','Using electronic services chosen by the User.','Sending error reports if the User consents.','The Software does not connect to the Company\'s servers except when necessary to provide the aforementioned services.']},
      {t:'Article 10: Updates',i:['The Company may periodically check for new Software updates for the purposes of:','Fixing bugs.','Closing security vulnerabilities.','Improving performance.','Adding new features.','Improving compatibility with operating systems.','Improving Software stability.','This may require sending limited technical information, such as: software version, operating system version, license status, software language.','This information does not include the content of the User\'s documents or local data.']},
      {t:'Article 11: Data Sharing',i:['The Company does not sell, rent, or trade personal data.','It also does not disclose data to any third party except in the following cases:','If the User expressly consents.','If disclosure is necessary to provide a service requested by the User.','If required by law or by order of a competent judicial or governmental authority.','If disclosure is necessary to protect the Company\'s rights, its users, or the Software\'s security.','In all cases, disclosed data is limited to the minimum necessary to achieve the required purpose.']},
      {t:'Article 12: Service Providers',i:['The Company may engage third parties to provide certain technical services related to the Software, such as:','Update file hosting.','Email services.','Technical analytics services.','Cloud backup services (if any).','Technical support services.','The Company commits to selecting service providers with an appropriate level of security and reliability, and does not permit them to use data except to the extent necessary to perform the agreed services.']},
      {t:'Article 13: Information Security',i:['The Company commits to taking appropriate technical, organizational, and administrative measures to protect data from:','Unauthorized access.','Unlawful use.','Modification or damage.','Loss.','Leakage.','Unauthorized disclosure.','These measures include, as needed: encryption, license verification, access control, security updates, system monitoring, necessary backups for the Company\'s services.','However, no electronic system can be 100% secure, and the User is responsible for maintaining their device and their own security measures.']},
      {t:'Article 14: Data Retention Period',i:['The Company retains personal data only for the period necessary to achieve the purposes for which it was collected, or for the period required by applicable laws and regulations.','When no longer needed, the Company takes appropriate steps to delete, anonymize, or retain it if required by law.','The Company does not retain the content of User documents stored locally on their device.']},
      {t:'Article 15: User Rights',i:['Pandara Tech believes that the User has the right to know how their data is handled and seeks to enable them to exercise their rights in accordance with applicable laws and regulations.','The User may, where legally possible, request:','To know what data the Company holds about them.','To correct inaccurate or incomplete data.','To update their data when necessary.','To delete data no longer legally required to be retained.','To restrict data processing in cases permitted by law.','To withdraw any previously given consent, where processing is based on that consent.','To submit an inquiry or complaint regarding their privacy.','The Company will review requests and respond within a reasonable period, taking into account its legal and regulatory obligations.']},
      {t:'Article 16: User Responsibilities',i:['The User undertakes to:','Provide correct information when requested.','Maintain the confidentiality of their Activation Key and account data.','Protect their device from unauthorized access.','Install security updates provided by the Company when necessary.','Not share login data or verification methods with any other person.','The User bears responsibility for any use resulting from their failure to safeguard this data.']},
      {t:'Article 17: Children\'s Privacy',i:['Mentis is not directed at children and is not designed to collect their personal data.','The Company does not knowingly collect personal data from persons who do not have the legal capacity to use the Software.','If the Company becomes aware that it has obtained personal data of a child or a person not legally qualified to use the Software, it will take appropriate steps to delete that data as soon as possible, unless required by law to retain it.']},
      {t:'Article 18: External Links and Services',i:['The Software or website may contain links to websites, services, or products offered by third parties.','The Company has no control over the privacy policies or practices of those entities and assumes no responsibility for how they collect, use, or process data.','The Company advises the User to review the privacy policies of those entities before using their services.']},
      {t:'Article 19: Data Transfer',i:['The Company may use services, service providers, or technical infrastructure located outside the User\'s country of residence when necessary to provide certain electronic services.','In such cases, the Company takes reasonable measures to ensure an appropriate level of data protection, in accordance with applicable laws and regulations.','Data is only transferred to the extent necessary to provide the service or fulfill legal or contractual obligations.']},
      {t:'Article 20: Changes to Privacy Policy',i:['The Company may modify or update this policy at any time if legal, technical, or operational needs arise.','In the case of material changes, the Company will notify the User through appropriate means, including: within the Software, the website, email (if available), the updates page, or any other electronic means adopted by the Company.','The User\'s continued use of the Software after the changes take effect constitutes acceptance of the updated policy.']},
      {t:'Article 21: Contact Us',i:['For inquiries, requests, or complaints regarding the Privacy Policy or the processing of personal data, you may contact the Company through the official communication channels provided by Pandara Tech via its website or official channels.','The Company will make reasonable efforts to respond to all requests within a reasonable period, taking into account the nature of the request and legal requirements.']},
      {t:'Article 22: Governing Law',i:['This policy is governed by and construed in accordance with the laws of the Republic of Iraq, without prejudice to any mandatory rules relating to data protection, electronic transactions, or consumer rights that may be applicable.','In the event of any dispute relating to this policy, the parties shall first seek to settle it amicably. If this is not possible, the Iraqi courts shall have jurisdiction.']},

      {t:'Article 25: General Provisions',i:['This policy forms an integral part of the legal documents governing the use of Mentis and shall be read and interpreted in conjunction with: the End User License Agreement (EULA) and the Terms of Use.','In the event of any conflict between this policy and any other document regarding the processing of personal data, the provisions of the Privacy Policy shall apply to the extent related to data protection.']}

let lang = 'ar'; // always start in Arabic
let theme = 'light'; // always start in light
function applyLang(l, morph) {
  lang = l; localStorage.setItem('pandara-lang', l);
  if (morph) {
    document.documentElement.classList.add('lang-morph');
    setTimeout(() => {
      render(l);
      requestAnimationFrame(() => requestAnimationFrame(() => document.documentElement.classList.remove('lang-morph')));
    }, 320);
  } else { render(l); }
}
function applyTheme(th) {
  theme = th; localStorage.setItem('pandara-theme', th);
  document.documentElement.classList.toggle('theme-light', th === 'light');
}
function render(l) {
  const d = fullText[l];
  document.getElementById('labelEl').textContent = d.label;
  document.getElementById('titleEl').textContent = d.title;
  document.getElementById('metaEl').innerHTML = d.meta;
  let html = '<div style="background:var(--accent-soft);border-left:3px solid var(--accent);padding:16px 20px;border-radius:10px;font-size:15px;color:var(--ink-soft);margin-bottom:32px;line-height:1.8;">';
  d.preamble.forEach(p => { html += '<p style="margin-bottom:10px;">' + p + '</p>'; });
  html += '</div>';
  d.chapters.forEach(ch => {
    html += '<div class="clause"><h3>' + ch.t + '</h3>';
    if (ch.i.length === 1) { html += '<p>' + ch.i[0] + '</p>'; }
    else { html += '<p>' + ch.i[0] + '</p><ul>'; for (let j = 1; j < ch.i.length; j++) { html += '<li>' + ch.i[j] + '</li>'; } html += '</ul>'; }
    html += '</div>';
  });
  document.getElementById('docContainer').innerHTML = html;
  document.getElementById('footerEl').innerHTML = d.footer;
  const backEl = document.querySelector('[data-i18n="back"]');
  if (backEl) backEl.textContent = d.back;
  document.getElementById('langToggle').textContent = d.btn;
  document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.classList.toggle('rtl', l === 'ar');
}
document.getElementById('langToggle').addEventListener('click', () => applyLang(lang === 'en' ? 'ar' : 'en', true));
document.getElementById('themeToggle').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
applyLang(lang, false);
applyTheme(theme);
</script>
