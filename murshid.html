<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HTML Playground</title>
<link rel="icon" type="image/png" href="/logo white.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:Arial,Helvetica,sans-serif;background:#1a1d23;color:#e4e7ec}
.split{display:flex;height:100vh;gap:0}
.pane{flex:1;display:flex;flex-direction:column;min-width:0}
.pane-header{
  padding:8px 14px;font-size:12px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;background:#0f1115;color:#667085;border-bottom:1px solid #2a2d35;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;height:34px;
}
.pane-header .run-btn{
  background:#2563eb;color:#fff;border:none;border-radius:5px;
  padding:3px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:background .15s;
}
.pane-header .run-btn:hover{background:#1d4ed8}
textarea{
  flex:1;border:none;outline:none;resize:none;padding:16px;
  font-family:'Consolas','Courier New',monospace;font-size:13px;line-height:1.6;
  background:#0f1115;color:#e4e7ec;tab-size:2;
}
textarea::placeholder{color:#4a4d55}
iframe{
  flex:1;border:none;background:#fff;display:block;width:100%;
}
.divider{
  width:4px;cursor:col-resize;background:#2a2d35;flex-shrink:0;
  transition:background .15s;position:relative;
}
.divider:hover,.divider.active{background:#3b82f6}
body.dragging{user-select:none;cursor:col-resize}
body.dragging iframe{pointer-events:none}
@media(max-width:640px){
  .split{flex-direction:column}
  .divider{height:4px;width:auto;cursor:row-resize}
}
</style>
</head>
<body>
<div class="split" id="split">
  <div class="pane" id="editorPane">
    <div class="pane-header">
      HTML
      <button class="run-btn" id="runBtn">▶ Run</button>
    </div>
    <textarea id="code" placeholder="Paste your HTML here and click Run…"></textarea>
  </div>
  <div class="divider" id="divider"></div>
  <div class="pane" id="previewPane">
    <div class="pane-header">Preview</div>
    <iframe id="preview" sandbox="allow-scripts allow-same-origin" title="Preview"></iframe>
  </div>
</div>
<script>
(function(){
  const code=$('code'), preview=$('preview'), runBtn=$('runBtn'), divider=$('divider'), split=$('split');
  function $(id){return document.getElementById(id)}

  function render(){
    const html=code.value;
    const doc=preview.contentDocument||preview.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
  }

  runBtn.addEventListener('click',render);

  // Auto-run on Ctrl+Enter
  code.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();render()}
  });

  // Run on page load if there's content
  render();

  // Resizable divider
  let dragging=false;
  divider.addEventListener('mousedown',e=>{
    dragging=true;
    document.body.classList.add('dragging');
    divider.classList.add('active');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const rect=split.getBoundingClientRect();
    let pct=((e.clientX-rect.left)/rect.width)*100;
    pct=Math.max(20,Math.min(80,pct));
    editorPane.style.flex=pct+'%';
    previewPane.style.flex=(100-pct)+'%';
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){
      dragging=false;
      document.body.classList.remove('dragging');
      divider.classList.remove('active');
    }
  });
})();
</script>
</body>
</html>
