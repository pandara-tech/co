<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title data-i18n="page-title">Signal — Pandara Tech</title>
<meta name="description" content="A transmission from Pandara Tech." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .signal-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(70% 90% at 85% 10%, rgba(21,122,110,0.16), transparent 60%),
      radial-gradient(60% 80% at 8% 95%, rgba(217,179,106,0.10), transparent 55%),
      var(--ink);
    padding: 80px 24px; position: relative; overflow: hidden;
  }
  .signal-page::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(47,182,166,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,182,166,0.05) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, #000 10%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, #000 10%, transparent 80%);
    pointer-events: none;
  }
  .signal-card {
    position: relative; z-index: 2; max-width: 560px; width: 100%;
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 22px; padding: 52px 46px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.25);
    animation: sigIn 0.9s var(--ease) both;
  }
  @keyframes sigIn { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: none; } }
  .signal-mark {
    width: 64px; height: 64px; margin: 0 auto 22px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--accent); color: var(--accent);
    box-shadow: 0 0 24px rgba(47,182,166,0.3);
    animation: sigPulse 2.4s ease-in-out infinite;
  }
  @keyframes sigPulse { 0%,100% { box-shadow: 0 0 18px rgba(47,182,166,0.25); } 50% { box-shadow: 0 0 34px rgba(47,182,166,0.55); } }
  .signal-card h1 {
    font-family: 'Raleway', sans-serif; font-weight: 900; font-size: 26px;
    letter-spacing: 1px; text-transform: uppercase; margin: 0 0 10px; color: var(--paper);
  }
  .signal-tag { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 26px; }
  .signal-text { font-size: 15px; line-height: 1.8; color: var(--paper); opacity: 0.72; margin: 0 0 28px; }
  .signal-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .signal-btn {
    font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
    padding: 12px 24px; border-radius: 999px; cursor: pointer; transition: all 0.25s var(--ease);
    text-decoration: none;
  }
  .signal-btn.primary { background: var(--accent); color: var(--ink); border: 1px solid var(--accent); }
  .signal-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(47,182,166,0.4); }
  .signal-btn.ghost { background: transparent; color: var(--paper); border: 1px solid var(--line-strong); }
  .signal-btn.ghost:hover { border-color: var(--accent); color: var(--accent); }
  .signal-lang {
    position: fixed; top: 20px; right: 24px; z-index: 200;
    width: 42px; height: 42px; border-radius: 11px; cursor: pointer;
    border: 1px solid var(--line-strong); background: var(--surface); color: var(--paper);
    font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 12px;
    display: flex; align-items: center; justify-content: center; transition: all 0.25s var(--ease);
  }
  .signal-lang:hover { border-color: var(--accent); color: var(--accent); }
  html.rtl .signal-lang { right: auto; left: 24px; }
  html.rtl .signal-card { font-family: 'Cairo', 'Inter', sans-serif; }
  html.theme-light .signal-page { background: var(--ink); }
</style>
</head>
<body>

<button class="signal-lang" id="langToggle">AR</button>

<div class="signal-page">
  <div class="signal-card">
    <div class="signal-mark">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 0-7 7c0 3 2 5 2 8h10c0-3 2-5 2-8a7 7 0 0 0-7-7z"/><path d="M9 21h6"/></svg>
    </div>
    <div class="signal-tag" data-i18n="signal-tag">Encrypted Channel</div>
    <h1 data-i18n="signal-title">You found the signal</h1>
    <p class="signal-text" data-i18n="signal-text">This page isn't in the menu. If you're reading this, you were meant to. Want a look at what we're building before anyone else?</p>
    <div class="signal-actions">
      <a class="signal-btn primary" href="index.html" data-i18n="signal-back">Return to base</a>
      <a class="signal-btn ghost" href="https://instagram.com/pandaratech" target="_blank" rel="noopener" data-i18n="signal-ig">Follow the channel</a>
    </div>
  </div>
</div>

<script>
  const t = {
    en: {
      'page-title': 'Signal — Pandara Tech',
      'signal-tag': 'Encrypted Channel',
      'signal-title': 'You found the signal',
      'signal-text': "This page isn't in the menu. If you're reading this, you were meant to. Want a look at what we're building before anyone else?",
      'signal-back': 'Return to base',
      'signal-ig': 'Follow the channel',
      'btn': 'AR'
    },
    ar: {
      'page-title': 'الإشارة — Pandara Tech',
      'signal-tag': 'قناة مشفرة',
      'signal-title': 'لقد وجدت الإشارة',
      'signal-text': 'هذه الصفحة ليست في القائمة. إن كنت تقرأ هذا، فقد كنت مقصودًا. هل تريد نظرة على ما نبنيه قبل الآخرين؟',
      'signal-back': 'العودة إلى القاعدة',
      'signal-ig': 'تابع القناة',
      'btn': 'EN'
    }
  };
  let lang = localStorage.getItem('pandara-lang') === 'ar' ? 'ar' : 'en';
  function apply(l) {
    lang = l;
    localStorage.setItem('pandara-lang', l);
    const d = t[l];
    document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.dataset.i18n; if (d[k]) el.textContent = d[k]; });
    document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
    document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.classList.toggle('rtl', l === 'ar');
    document.getElementById('langToggle').textContent = d.btn;
    document.title = d['page-title'];
    const theme = localStorage.getItem('pandara-theme') || 'dark';
    document.documentElement.classList.toggle('theme-light', theme === 'light');
  }
  document.getElementById('langToggle').addEventListener('click', () => apply(lang === 'en' ? 'ar' : 'en'));
  apply(lang);
</script>

</body>
</html>
