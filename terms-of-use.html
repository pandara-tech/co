<script>
const fullText = {
  ar: {
    label: 'قانوني', title: 'شروط الاستخدام', meta: 'Mentis &middot; الإصدار 1.0.6 &middot; آخر تحديث: 10/07/2026',
    preamble: ['مرحبًا بك في Mentis.', 'تنظم شروط الاستخدام هذه ("الشروط") العلاقة القانونية بين Pandara Tech ("الشركة") وبين أي شخص طبيعي أو اعتباري يستخدم برنامج Mentis أو أي من الخدمات أو المواقع أو المنتجات المرتبطة به ("المستخدم").', 'يرجى قراءة هذه الشروط بعناية قبل تثبيت البرنامج أو تشغيله أو استخدامه.', 'يُعد تثبيت البرنامج أو تشغيله أو استخدامه أو الضغط على زر "أوافق" أو الاستمرار في استخدامه موافقةً صريحة ونهائية على جميع أحكام هذه الشروط.', 'إذا لم توافق على هذه الشروط، فيجب عليك عدم استخدام البرنامج أو أي من خدماته.'],
    chapters: [
      {t:'المادة الأولى: التعاريف',i:['لأغراض هذه الشروط يقصد بالمصطلحات الآتية المعاني المبينة إزاء كل منها ما لم يقتض السياق خلاف ذلك.','الشركة: شركة Pandara Tech، المطور والناشر والمرخص الرسمي لبرنامج Mentis.','البرنامج: برنامج Mentis بجميع إصداراته، ومكوناته، ووحداته البرمجية، وخدماته، وتحديثاته، وملحقاته.','المستخدم: كل شخص طبيعي أو اعتباري يستخدم البرنامج أو أي خدمة مرتبطة به.','الخدمات: جميع الخدمات الإلكترونية أو التقنية أو المستقبلية التي تقدمها الشركة والمتعلقة ببرنامج Mentis.','الموقع الإلكتروني: الموقع الرسمي لشركة Pandara Tech وأي مواقع أو صفحات إلكترونية تابعة لها.']},
      {t:'المادة الثانية: نطاق التطبيق',i:['تسري هذه الشروط على: برنامج Mentis، الموقع الإلكتروني، خدمات الدعم الفني، خدمات التحديث، الخدمات الإلكترونية، الخدمات المستقبلية التي تطورها الشركة.','كما تعتبر هذه الشروط مكملة لاتفاقية ترخيص المستخدم النهائي (EULA) وسياسة الخصوصية.']},
      {t:'المادة الثالثة: الأهلية القانونية',i:['يقر المستخدم بأنه:','يتمتع بالأهلية القانونية الكاملة.','يمتلك الصلاحية القانونية لاستخدام البرنامج إذا كان يمثل مؤسسة أو شركة.','سيلتزم بجميع القوانين والأنظمة السارية.','ويتحمل المستخدم المسؤولية الكاملة عن أي استخدام يتم بواسطة حسابه أو ترخيصه.']},
      {t:'المادة الرابعة: قبول الشروط',i:['يعتبر المستخدم موافقًا على هذه الشروط بمجرد:','تثبيت البرنامج.','تشغيل البرنامج.','استخدام أي خدمة.','إنشاء حساب (إن وجد).','إدخال مفتاح التفعيل.','الاستمرار باستخدام البرنامج بعد تحديث هذه الشروط.','ويعد هذا القبول ملزمًا قانونًا.']},
      {t:'المادة الخامسة: استخدام البرنامج',i:['يجوز للمستخدم استخدام البرنامج فقط للأغراض المشروعة التي صُمم من أجلها.','ويتعهد المستخدم بعدم استخدام البرنامج بما يؤدي إلى: مخالفة القوانين، الإضرار بالشركة، الإضرار بالمستخدمين الآخرين، تعطيل البرنامج، إساءة استخدام الخدمات.']},
      {t:'المادة السادسة: الاستخدام المقبول',i:['يمنح البرنامج للمستخدم حق استخدامه وفقًا للغرض الذي صُمم من أجله، وبما يتوافق مع أحكام هذه الشروط واتفاقية ترخيص المستخدم النهائي (EULA) والقوانين والأنظمة النافذة.','ويجوز للمستخدم استخدام البرنامج من أجل: إنشاء وإدارة الكتب والمخاطبات الرسمية، إعداد النماذج والمستندات، إدارة البيانات والسجلات، تنظيم الأعمال الإدارية، أي استخدام آخر تسمح به الشركة.','ولا يجوز تفسير أي من هذه الشروط على أنها تمنح المستخدم حقًا في امتلاك البرنامج أو أي من مكوناته أو حقوقه الفكرية.']},
      {t:'المادة السابعة: القيود على الاستخدام',i:['يلتزم المستخدم بعدم القيام بأي من الأفعال الآتية:','استخدام البرنامج بطريقة تخالف القوانين أو الأنظمة.','استخدام البرنامج في أي نشاط احتيالي أو غير مشروع.','محاولة تعطيل البرنامج أو خوادمه أو خدماته.','محاولة الوصول غير المصرح به إلى الأنظمة أو الخدمات التابعة للشركة.','استخدام البرنامج للإضرار بالشركة أو بالمستخدمين الآخرين.','نشر أي برمجيات ضارة أو فيروسات أو أدوات تخريبية من خلال البرنامج.','استخدام البرنامج بطريقة قد تؤثر على استقراره أو أدائه أو أمنه.','ويتحمل المستخدم المسؤولية الكاملة عن أي استخدام مخالف لهذه الشروط.']},
      {t:'المادة الثامنة: الحسابات (إن وجدت)',i:['قد تتطلب بعض الخدمات إنشاء حساب للمستخدم.','وفي هذه الحالة يلتزم المستخدم بما يأتي:','تقديم معلومات صحيحة وحديثة.','المحافظة على سرية بيانات تسجيل الدخول.','عدم مشاركة الحساب مع أي شخص آخر.','تحديث بياناته عند تغيرها.','ويتحمل المستخدم المسؤولية الكاملة عن جميع الأنشطة التي تتم من خلال حسابه.','ويجب عليه إخطار الشركة فورًا عند الاشتباه بأي استخدام غير مصرح به.']},
      {t:'المادة التاسعة: الاشتراكات والمدفوعات',i:['إذا قدمت الشركة خدمات مدفوعة أو اشتراكات مستقبلًا، فإنها تخضع للشروط الآتية:','يلتزم المستخدم بسداد الرسوم المستحقة في مواعيدها.','قد تختلف الأسعار بحسب نوع الترخيص أو الخدمة.','تحتفظ الشركة بحق تعديل الأسعار مستقبلًا، على ألا يؤثر ذلك في الاشتراكات السارية إلا عند التجديد.','لا تعتبر الرسوم المدفوعة قابلة للاسترداد إلا إذا نصت الشركة أو القانون على خلاف ذلك.']},
      {t:'المادة العاشرة: التحديثات والتطوير',i:['تعمل الشركة باستمرار على تطوير البرنامج وتحسينه.','ولذلك يجوز لها:','إصدار تحديثات.','إضافة مزايا جديدة.','تعديل أو إزالة بعض الوظائف.','تحسين واجهة المستخدم.','إصلاح الأخطاء.','تعزيز الأمان.','ويقر المستخدم بأن استمرار استخدام البرنامج قد يتطلب تثبيت بعض التحديثات الأساسية.']},
      {t:'المادة الحادية عشرة: الخدمات الإلكترونية',i:['قد يوفر البرنامج بعض الخدمات التي تتطلب الاتصال بالإنترنت، ومنها:','التحقق من التراخيص.','تنزيل التحديثات.','خدمات الدعم الفني.','الخدمات السحابية (إن وجدت).','الخدمات المستقبلية التي تضيفها الشركة.','ولا تضمن الشركة استمرار توفر جميع الخدمات بصورة دائمة، ويجوز تعديلها أو إيقافها أو استبدالها وفقًا لمقتضيات التشغيل أو التطوير.']},
      {t:'المادة الثانية عشرة: الدعم الفني',i:['يجوز للشركة تقديم خدمات الدعم الفني وفقًا لسياستها الداخلية.','ولا يشمل الدعم الفني الحالات الناتجة عن: تعديل البرنامج، استخدام نسخة غير أصلية، كسر الحماية، استخدام البرنامج بطريقة مخالفة لهذه الشروط، أعطال الأجهزة أو أنظمة التشغيل.','وللشركة الحق في تعديل أو تعليق أو إنهاء خدمات الدعم الفني في أي وقت.']},
      {t:'المادة الثالثة عشرة: المحتوى المقدم من المستخدم',i:['يظل المستخدم المالك الوحيد للمحتوى والبيانات والمستندات التي يقوم بإنشائها باستخدام البرنامج.','ويتحمل وحده المسؤولية الكاملة عن: دقة المعلومات، قانونية المحتوى، سلامة المستندات، أي آثار قانونية أو إدارية أو مالية تترتب على استخدامه.','ولا تقوم الشركة بمراجعة أو اعتماد أو ضمان صحة أي محتوى ينشئه المستخدم.']},
      {t:'المادة الرابعة عشرة: الملكية الفكرية',i:['جميع حقوق الملكية الفكرية المتعلقة ببرنامج Mentis، بما في ذلك الشفرة المصدرية، والتصميم، والواجهات، والقوالب المرفقة، والشعارات، والأسماء التجارية، والوثائق، والرسومات، والتحديثات، مملوكة حصريًا لشركة Pandara Tech.','ولا يجوز للمستخدم نسخها أو تعديلها أو إعادة توزيعها أو استغلالها بأي صورة دون موافقة كتابية مسبقة من الشركة.']},
      {t:'المادة الخامسة عشرة: مدة توفر الخدمة',i:['تبذل الشركة جهودًا معقولة لضمان إتاحة البرنامج والخدمات المرتبطة به بصورة مستقرة وموثوقة.','ومع ذلك، لا تضمن الشركة أن يكون البرنامج أو الخدمات متاحة دون انقطاع أو خالية من الأعطال أو الأخطاء في جميع الأوقات.','ويجوز للشركة تعليق البرنامج أو الخدمات مؤقتًا أو كليًا لإجراء أعمال الصيانة أو التحديث أو التطوير أو لأسباب أمنية أو تشغيلية دون أن يترتب على ذلك أي مسؤولية.']},
      {t:'المادة السادسة عشرة: التعديلات على البرنامج',i:['تحتفظ الشركة بحقها، وفقًا لتقديرها، في:','تطوير البرنامج.','تعديل خصائصه.','إضافة أو إزالة ميزات.','تحسين الأداء.','تعديل واجهة المستخدم.','إيقاف بعض الوظائف.','دمج خدمات جديدة.','ولا يترتب على هذه التعديلات أي التزام على الشركة بالإبقاء على جميع المزايا أو الخصائص السابقة.']},
      {t:'المادة السابعة عشرة: تعليق أو إنهاء الخدمات',i:['يجوز للشركة تعليق أو تقييد أو إنهاء وصول المستخدم إلى البرنامج أو أي من خدماته إذا تبين لها، وفقًا لتقديرها المعقول، أن المستخدم:','خالف هذه الشروط.','خالف اتفاقية ترخيص المستخدم النهائي (EULA).','استخدم البرنامج بطريقة غير مشروعة.','حاول تجاوز نظام الحماية أو التفعيل.','استخدم البرنامج للإضرار بالشركة أو بمستخدميها.','قدم معلومات مضللة أو غير صحيحة.','ولا يمنع إنهاء الخدمة الشركة من المطالبة بأي حقوق أو تعويضات يجيزها القانون.']},
      {t:'المادة الثامنة عشرة: إخلاء المسؤولية',i:['يُقدم برنامج Mentis وجميع الخدمات المرتبطة به "كما هو" (As Is) و"حسب توفره" (As Available).','ورغم التزام الشركة بتطوير البرنامج وتحسينه باستمرار، فإنها لا تضمن:','خلو البرنامج من جميع الأخطاء.','عمل البرنامج دون انقطاع.','توافق البرنامج مع جميع الأجهزة أو أنظمة التشغيل.','تحقيق نتائج أو أغراض معينة للمستخدم.','توافق البرنامج مع جميع المتطلبات الخاصة بكل مؤسسة.','ويتحمل المستخدم مسؤولية تقييم مدى ملاءمة البرنامج لاحتياجاته قبل استخدامه.']},
      {t:'المادة التاسعة عشرة: حدود المسؤولية',i:['إلى أقصى حد يسمح به القانون، لا تتحمل الشركة أو موظفوها أو مديروها أو شركاؤها أو وكلاؤها أي مسؤولية عن:','فقدان البيانات.','توقف الأعمال.','خسارة الأرباح.','فقدان الفرص التجارية.','الأضرار غير المباشرة.','الأضرار العرضية.','الأضرار الخاصة.','الأضرار التبعية.','أي خسائر ناتجة عن استخدام البرنامج أو عدم القدرة على استخدامه.','وفي جميع الأحوال، لا تتجاوز المسؤولية الإجمالية للشركة، إن ثبتت قانونًا، قيمة الترخيص أو الاشتراك الذي دفعه المستخدم عن البرنامج محل النزاع.']},
      {t:'المادة العشرون: التعويض',i:['يلتزم المستخدم بتعويض شركة Pandara Tech والدفاع عنها وإبراء ذمتها، وكذلك مسؤوليها وموظفيها ووكلائها وشركائها، عن أي مطالبات أو أضرار أو خسائر أو مسؤوليات أو نفقات أو رسوم أو أتعاب محاماة تنشأ نتيجة:','مخالفته لهذه الشروط.','مخالفته للقوانين النافذة.','إساءة استخدام البرنامج.','انتهاكه لحقوق الغير.','انتهاكه لحقوق الملكية الفكرية.','ويظل هذا الالتزام نافذًا حتى بعد انتهاء استخدام البرنامج.']},
      {t:'المادة الحادية والعشرون: القوة القاهرة',i:['لا تتحمل الشركة أي مسؤولية عن أي تأخير أو إخفاق في تنفيذ التزاماتها إذا كان ذلك ناشئًا عن ظروف خارجة عن إرادتها، بما في ذلك على سبيل المثال لا الحصر:','الكوارث الطبيعية.','الحروب.','الاضطرابات الأمنية.','القرارات الحكومية.','الهجمات الإلكترونية.','انقطاع الإنترنت.','انقطاع الكهرباء.','أعطال مزودي الخدمات.','الجوائح.','أي ظروف مماثلة لا يمكن توقعها أو السيطرة عليها.']},
      {t:'المادة الثانية والعشرون: الروابط والخدمات الخارجية',i:['قد يحتوي البرنامج أو الموقع الإلكتروني على روابط أو خدمات أو منتجات تابعة لجهات خارجية.','ولا تتحمل الشركة أي مسؤولية عن: محتوى تلك المواقع، سياسات الخصوصية الخاصة بها، الخدمات التي تقدمها، أي تعامل يتم بين المستخدم وتلك الجهات.','ويكون استخدام تلك الخدمات على مسؤولية المستخدم وحده.']},
      {t:'المادة الثالثة والعشرون: التعديلات على شروط الاستخدام',i:['يجوز للشركة تعديل أو تحديث هذه الشروط في أي وقت إذا اقتضت الحاجة القانونية أو التقنية أو التشغيلية ذلك.','وتقوم الشركة بإشعار المستخدم بالتعديلات الجوهرية عبر إحدى الوسائل الآتية: داخل البرنامج، الموقع الإلكتروني، البريد الإلكتروني (إن وجد)، صفحة التحديثات، أي وسيلة إلكترونية أخرى تعتمدها الشركة.','ويُعد استمرار المستخدم في استخدام البرنامج بعد نفاذ التعديلات موافقةً عليها.']},
      {t:'المادة الرابعة والعشرون: القانون الواجب التطبيق',i:['تخضع هذه الشروط وتُفسر وفقًا لقوانين جمهورية العراق، بما في ذلك القوانين المنظمة للعقود الإلكترونية، والملكية الفكرية، والمعاملات الإلكترونية، وأي تشريعات أخرى ذات صلة.','ولا يؤثر اختلاف مكان استخدام البرنامج أو إقامة المستخدم على سريان القانون العراقي، ما لم يفرض القانون واجب التطبيق خلاف ذلك.']},
      {t:'المادة الخامسة والعشرون: تسوية النزاعات',i:['في حال نشوء أي نزاع يتعلق بهذه الشروط أو باستخدام برنامج Mentis، يلتزم الطرفان بالسعي أولًا إلى تسويته وديًا من خلال التواصل المباشر.','وفي حال تعذر التوصل إلى حل خلال ثلاثين (30) يومًا من تاريخ إخطار أحد الطرفين للطرف الآخر بوجود النزاع، يحق لأي من الطرفين اللجوء إلى المحاكم المختصة في جمهورية العراق.']},
      {t:'المادة السادسة والعشرون: الاختصاص القضائي',i:['تختص محاكم جمهورية العراق دون غيرها بالنظر والفصل في أي نزاع ينشأ عن هذه الشروط أو يتعلق باستخدام البرنامج أو الخدمات المرتبطة به.','ويكون الاختصاص المكاني للمحكمة المختصة في المحافظة التي يقع فيها المقر الرئيسي لشركة Pandara Tech، ما لم ينص القانون على خلاف ذلك.']},
      {t:'المادة السابعة والعشرون: استقلالية الأحكام',i:['إذا قضت محكمة أو جهة قضائية مختصة ببطلان أو عدم قابلية تنفيذ أي حكم من أحكام هذه الشروط، فإن ذلك لا يؤثر على صحة أو نفاذ باقي الأحكام، والتي تظل سارية وملزمة إلى أقصى حد يسمح به القانون.','ويُستعاض عن الحكم غير القابل للتنفيذ بحكم قانوني يحقق الغرض المقصود منه بأقرب صورة ممكنة.']},
      {t:'المادة الثامنة والعشرون: عدم التنازل عن الحقوق',i:['إن عدم ممارسة الشركة لأي حق من حقوقها أو تأخرها في ممارسته أو عدم اتخاذها أي إجراء تجاه أي مخالفة لهذه الشروط، لا يُعد تنازلًا عن ذلك الحق، ولا يمنعها من ممارسته في أي وقت لاحق.','ولا يكون أي تنازل عن أي حق نافذًا إلا إذا كان صادرًا كتابةً عن الشركة.']},
      {t:'المادة التاسعة والعشرون: التنازل عن الاتفاقية',i:['لا يجوز للمستخدم التنازل عن أي من حقوقه أو التزاماته الناشئة عن هذه الشروط أو نقلها إلى أي شخص أو جهة دون موافقة كتابية مسبقة من الشركة.','ويجوز للشركة نقل أو إحالة أو دمج أو بيع أو التنازل عن حقوقها والتزاماتها أو عن البرنامج أو أي من أصوله أو علاماته التجارية إلى أي شخص طبيعي أو اعتباري أو خلف قانوني، دون الحاجة إلى الحصول على موافقة المستخدم، شريطة ألا يؤثر ذلك في الحقوق الأساسية الممنوحة له بموجب هذه الشروط.']},
      {t:'المادة الثلاثون: العلاقة بين الوثائق القانونية',i:['تُعد هذه الشروط جزءًا من الإطار القانوني المنظم لاستخدام برنامج Mentis، وتُقرأ وتُفسر مع الوثائق الآتية: اتفاقية ترخيص المستخدم النهائي (EULA)، سياسة الخصوصية (Privacy Policy).','وفي حال وجود تعارض بين هذه الوثائق، يكون ترتيب الأولوية على النحو الآتي: اتفاقية ترخيص المستخدم النهائي (EULA)، سياسة الخصوصية، شروط الاستخدام.','ويسري كل مستند في نطاق الموضوع الذي ينظمه.']},
      {t:'المادة الحادية والثلاثون: التواصل مع الشركة',i:['يمكن للمستخدم التواصل مع شركة Pandara Tech بشأن أي استفسار أو ملاحظة أو شكوى تتعلق بالبرنامج أو هذه الشروط من خلال وسائل الاتصال الرسمية التي تعلنها الشركة عبر موقعها الإلكتروني أو داخل البرنامج.','وتبذل الشركة جهدًا معقولًا للرد على الطلبات خلال مدة مناسبة، دون أن يشكل ذلك التزامًا بزمن محدد ما لم ينص القانون على خلاف ذلك.']},
      {t:'المادة الثانية والثلاثون: اللغة المعتمدة',i:['قد توفر الشركة ترجمات لهذه الشروط بلغات أخرى لتسهيل استخدامها.','وفي حال وجود أي اختلاف أو تعارض بين النسخة العربية وأي نسخة مترجمة، تكون النسخة العربية هي النسخة الرسمية والمعتمدة في التفسير والتطبيق، ما لم يفرض القانون واجب التطبيق خلاف ذلك.']},
      {t:'المادة الثالثة والثلاثون: سريان شروط الاستخدام',i:['تدخل هذه الشروط حيز النفاذ اعتبارًا من تاريخ نشرها أو إتاحتها داخل البرنامج أو على الموقع الإلكتروني.','ويُعد استمرار المستخدم في استخدام برنامج Mentis أو أي من خدماته بعد ذلك التاريخ قبولًا بجميع أحكامها.','وتظل المواد المتعلقة بالملكية الفكرية، والسرية، وحدود المسؤولية، والتعويض، وتسوية النزاعات، وأي أحكام بطبيعتها تستمر بعد انتهاء الاستخدام، نافذة حتى بعد إنهاء العلاقة بين المستخدم والشركة.']},
      {t:'المادة الرابعة والثلاثون: أحكام عامة',i:['تشكل هذه الشروط الاتفاق الكامل بين المستخدم وشركة Pandara Tech فيما يتعلق باستخدام برنامج Mentis، وتحل محل جميع التفاهمات أو المراسلات أو الاتفاقات السابقة المتعلقة بالموضوع ذاته.','وإذا تعارض أي نص في هذه الشروط مع قانون واجب التطبيق، فيُفسر النص بالقدر الذي يجعله متوافقًا مع ذلك القانون دون المساس بصحة باقي الأحكام.','وجميع الحقوق التي لم تُمنح للمستخدم صراحةً بموجب هذه الشروط تبقى محفوظة بالكامل لشركة Pandara Tech.']},
      {t:'المادة الخامسة والثلاثون: جميع الحقوق محفوظة',i:['جميع حقوق الملكية الفكرية وحقوق المؤلف والعلامات التجارية والأسماء التجارية والتصاميم والوثائق والقوالب والأكواد البرمجية والمحتوى والمواد المتعلقة ببرنامج Mentis مملوكة حصريًا لشركة Pandara Tech.','ولا يجوز نسخ أو إعادة إنتاج أو توزيع أو تعديل أو استغلال أي جزء من البرنامج أو محتواه أو وثائقه أو مواده بأي وسيلة كانت دون موافقة كتابية مسبقة من الشركة، باستثناء ما تسمح به القوانين النافذة أو اتفاقية الترخيص.']}

    footer: 'End of Terms of Use<br>Software: Mentis &middot; Company: <a href="https://pandaratech.online" style="color:var(--accent);text-decoration:none;">Pandara Tech</a> &middot; Version: 1.0.6<br>&copy; All rights reserved to <a href="https://pandaratech.online" style="color:var(--accent);text-decoration:none;">Pandara Tech</a>.',
    back: 'Back to Pandara Tech',
    btn: 'AR'
  }
};
let lang = localStorage.getItem('pandara-lang') === 'ar' ? 'ar' : 'en';
function render(l) {
  const d = fullText[l];
  document.getElementById('labelEl').textContent = d.label;
  document.getElementById('titleEl').textContent = d.title;
  document.getElementById('metaEl').innerHTML = d.meta;
  let html = '<div style="background:var(--accent-soft);border-left:3px solid var(--accent);padding:16px 20px;border-radius:10px;font-size:15px;color:var(--ink-soft);margin-bottom:32px;line-height:1.8;">';
  d.preamble.forEach(p => { html += '<p style="margin-bottom:10px;">' + p + '</p>'; });
  html += '</div>';
  d.chapters.forEach(ch => {
    html += '<div class="clause"><h3>' + ch.t + '</h3>';
    if (ch.i.length === 1) { html += '<p>' + ch.i[0] + '</p>'; }
    else { html += '<p>' + ch.i[0] + '</p><ul>'; for (let j = 1; j < ch.i.length; j++) { html += '<li>' + ch.i[j] + '</li>'; } html += '</ul>'; }
    html += '</div>';
  });
  document.getElementById('docContainer').innerHTML = html;
  document.getElementById('footerEl').innerHTML = d.footer;
  const backEl = document.querySelector('[data-i18n="back"]');
  if (backEl) backEl.textContent = d.back;
  document.getElementById('langToggle').textContent = d.btn;
  document.documentElement.lang = l === 'ar' ? 'ar' : 'en';
  document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.classList.toggle('rtl', l === 'ar');
}
document.getElementById('langToggle').addEventListener('click', () => { lang = lang === 'en' ? 'ar' : 'en'; localStorage.setItem('pandara-lang', lang); render(lang); });
render(lang);
</script>
